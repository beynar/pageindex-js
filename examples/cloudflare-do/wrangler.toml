# wrangler.toml - Cloudflare configuration

name = "pageindex-service"
main = "index.ts"
compatibility_date = "2024-12-01"

# Node.js compatibility for pageindex library
compatibility_flags = ["nodejs_compat"]

[vars]
# OPENAI_API_KEY should be set via wrangler secret:
# wrangler secret put OPENAI_API_KEY

# ─────────────────────────────────────────────────────────────
# Durable Objects Configuration
# ─────────────────────────────────────────────────────────────

[[durable_objects.bindings]]
name = "DOCUMENT_DO"
class_name = "DocumentDO"

# Migration for SQLite-backed Durable Objects
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DocumentDO"]

# ─────────────────────────────────────────────────────────────
# D1 Database Configuration (Global Index)
# ─────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "pageindex-global"
database_id = "your-database-id-here"
# Replace with your actual database ID after running:
# wrangler d1 create pageindex-global

# ─────────────────────────────────────────────────────────────
# Build Configuration
# ─────────────────────────────────────────────────────────────

[build]
command = "npm run build"

# ─────────────────────────────────────────────────────────────
# Development Configuration
# ─────────────────────────────────────────────────────────────

[dev]
port = 8787
local_protocol = "http"

# ─────────────────────────────────────────────────────────────
# Production Limits
# ─────────────────────────────────────────────────────────────

[limits]
cpu_ms = 50000
